services:
  - type: web
    name: karaoke
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: karaoke-db
          property: connectionString
      - key: ADMIN_PIN
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: karaoke-db
    databaseName: karaoke
    plan: free
